<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#475467" flood-opacity="0.20"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="32" fill="url(#bg)"/>
  <text x="70" y="74" fill="#111827" font-size="38" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-weight="800">Baby Daily Logger Agent Skill</text>
  <text x="70" y="114" fill="#475467" font-size="24" font-family="Arial, 'Noto Sans CJK SC', sans-serif">用自然语言记录宝宝起居，并兼容娃事通微信小程序</text>

  <g filter="url(#shadow)">
    <rect x="70" y="180" width="245" height="165" rx="24" fill="#ffffff"/>
    <text x="100" y="230" fill="#111827" font-size="26" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-weight="700">一句话输入</text>
    <text x="100" y="278" fill="#344054" font-size="22" font-family="Arial, 'Noto Sans CJK SC', sans-serif">刚刚喝了120奶</text>
    <text x="100" y="316" fill="#344054" font-size="22" font-family="Arial, 'Noto Sans CJK SC', sans-serif">10点20睡着了</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="480" y="170" width="245" height="185" rx="24" fill="#ffffff"/>
    <text x="510" y="220" fill="#111827" font-size="26" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-weight="700">Agent Skill</text>
    <text x="510" y="268" fill="#344054" font-size="22" font-family="Arial, 'Noto Sans CJK SC', sans-serif">解析时间和类型</text>
    <text x="510" y="306" fill="#344054" font-size="22" font-family="Arial, 'Noto Sans CJK SC', sans-serif">缺信息时追问</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="890" y="180" width="245" height="165" rx="24" fill="#ffffff"/>
    <text x="920" y="230" fill="#111827" font-size="26" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-weight="700">结构化数据</text>
    <text x="920" y="278" fill="#344054" font-size="22" font-family="Arial, 'Noto Sans CJK SC', sans-serif">查询 / 图表</text>
    <text x="920" y="316" fill="#344054" font-size="22" font-family="Arial, 'Noto Sans CJK SC', sans-serif">导出给娃事通</text>
  </g>

  <path d="M335 262 C390 262 420 262 455 262" stroke="#98a2b3" stroke-width="8" fill="none" stroke-linecap="round"/>
  <polygon points="455,262 435,249 435,275" fill="#98a2b3"/>
  <path d="M745 262 C800 262 830 262 865 262" stroke="#98a2b3" stroke-width="8" fill="none" stroke-linecap="round"/>
  <polygon points="865,262 845,249 845,275" fill="#98a2b3"/>

  <text x="70" y="442" fill="#475467" font-size="22" font-family="Arial, 'Noto Sans CJK SC', sans-serif">Agent 负责自然语言入口；娃事通小程序继续作为可视化和历史数据客户端。</text>
</svg>
